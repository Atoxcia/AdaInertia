###############################################################################
# AdaInertia — Unified Evaluation Configuration
#
# Usage:
# python agentboard/eval_main.py \
#    --cfg-path eval_configs/main_results_all_tasks.yaml \
#    --tasks scienceworld \
#    --model DeepSeekChat \
#    --log_path ${PROJECT_PATH}/results/my_run
#
# Switch agent:   change agent.name  (ReactBaselineAgent / ReactInertiaAgent)
# Switch task:    change --tasks     (alfworld / scienceworld / tool-query / ...)
# Switch model:   change --model     (DeepSeekChat / Qwen25-72B / GPT4oMini / ...)
#
# When agent.name = ReactInertiaAgent, the inertia + RL fields below are used.
# When agent.name = ReactBaselineAgent, they are ignored automatically.
###############################################################################

run:
  max_num_steps: 50
  num_exam: 134         # alfworld=134, scienceworld=90 (overridden per-task below)
  wandb: false
  project_name: adainertia-eval
  baseline_dir: data/baseline_results
  log_path: ${PROJECT_PATH}/results/default_run

# ─────────────────────────────────────────────────────────────────────────────
# Agent Configuration
#   name: ReactBaselineAgent   → pure ReAct baseline (no inertia)
#   name: ReactInertiaAgent    → AdaInertia with RL meta-controller
# ─────────────────────────────────────────────────────────────────────────────
agent:
  name: ReactInertiaAgent
  memory_size: 25
  need_goal: true
  use_parser: true
  max_think_iters: 3
  max_steps: 50
  debug: false
  record_mod: true

  # ── Inertia parameters (only used when name = ReactInertiaAgent) ──
  use_inertia: true
  inertia_threshold: 0.2
  inertia_alpha: 0.5
  inertia_k: 2
  inertia_max: 1
  inertia_fallback_hint: true

  # ── DQN / RL meta-controller (AdaInertia v3, only for *_dqn task types) ──
  # use_rl_update: true         # enable online DQN training
  # reward_asymmetric: true     # asymmetric reward function
  # use_safety_gating: true     # force A0 on error-loop detection
  # use_pdg: true               # use progress-delta gating
  # disable_safety_gating: false
  # disable_pdg: false

# ─────────────────────────────────────────────────────────────────────────────
# LLM Backends  (select with --model)
# ─────────────────────────────────────────────────────────────────────────────
llm:
  # ── DeepSeek family ──
  DeepSeekChat:
    name: api
    engine: deepseek-chat
    api_base: https://api.deepseek.com/v1
    api_key: ${OPENAI_API_KEY}
    max_tokens: 4096
    temperature: 0.0
    top_p: 1
    stop:
    context_length: 64000
    dtype: float32
    use_parser: true

  # Alias used in RL experiments (same endpoint as DeepSeekChat)
  DeepSeekV3:
    name: api
    engine: deepseek-chat
    api_base: https://api.deepseek.com/v1
    api_key: ${OPENAI_API_KEY}
    max_tokens: 4096
    temperature: 0.0
    top_p: 1
    stop:
    context_length: 64000
    dtype: float32
    use_parser: true

  DeepSeek:
    name: api
    engine: deepseek-chat
    api_base: https://api.deepseek.com/v1
    api_key: ${OPENAI_API_KEY}
    max_tokens: 4096
    temperature: 0.0
    top_p: 1
    stop:
    context_length: 65536
    dtype: float32
    use_parser: true

  # ── Qwen family (SiliconFlow) ──
  Qwen25-72B:
    name: api
    engine: Qwen/Qwen2.5-72B-Instruct
    api_base: https://api.siliconflow.cn/v1
    api_key: ${OPENAI_API_KEY}
    max_tokens: 4096
    temperature: 0.0
    top_p: 1
    stop:
    context_length: 32768
    dtype: float32
    use_parser: true

  # Alias used in early experiments (same model, larger context window)
  Qwen72B:
    name: api
    engine: Qwen/Qwen2.5-72B-Instruct
    api_base: https://api.siliconflow.cn/v1
    api_key: ${OPENAI_API_KEY}
    max_tokens: 4096
    temperature: 0.0
    top_p: 1
    stop:
    context_length: 128000
    dtype: float32
    use_parser: true

