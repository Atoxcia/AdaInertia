# ─────────────────────────────────────────────────────────────────────────────
# Environment Configuration  (select with --tasks)
# ─────────────────────────────────────────────────────────────────────────────
env:
  # ── AlfWorld ──────────────────────────────────────────────────────────────
  alfworld:
    name: alfworld
    base_config: ${PROJECT_PATH}/agentboard/environment/alfworld/base_config.yaml
    split: eval_out_of_distribution
    batch_size: 1
    label_path: ${PROJECT_PATH}/data/alfworld/test.jsonl
    check_inventory: true
    check_actions: check valid actions
    num_exam: 134
    # ── Per-agent prompt paths (auto-selected based on agent.name) ──
    prompts:
      ReactBaselineAgent: ${PROJECT_PATH}/agentboard/prompts/ReactBaselineAgent/alfworld_react.json
      ReactInertiaAgent: ${PROJECT_PATH}/agentboard/prompts/ReactInertiaAgent/alfworld_react.json

  # ── ScienceWorld ──────────────────────────────────────────────────────────
  scienceworld:
    name: scienceworld
    envStepLimit: 30
    seed: 0
    simplefied: false
    check_inventory: true
    check_actions: check valid actions
    label_path: ${PROJECT_PATH}/data/scienceworld/test.jsonl
    num_exam: 90
    # ── Per-agent prompt paths (auto-selected based on agent.name) ──
    prompts:
      ReactBaselineAgent: ${PROJECT_PATH}/agentboard/prompts/ReactBaselineAgent/scienceworld_base.json
      ReactInertiaAgent: ${PROJECT_PATH}/agentboard/prompts/ReactInertiaAgent/scienceworld_base.json

  # ── Tool-Query ────────────────────────────────────────────────────────────
  tool-query:
    name: tool-query
    dataset_dir: ${PROJECT_PATH}/agentboard/data/data
    init_prompt_path: ${PROJECT_PATH}/agentboard/prompts
    result_dir: ${PROJECT_PATH}/results/tool_query
    check_actions: check_valid_actions
    seed: 1234
    num_exam: 20

