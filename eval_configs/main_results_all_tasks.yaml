  Qwen:
    name: api
    engine: Qwen/Qwen2.5-72B-Instruct
    api_base: https://api.siliconflow.cn/v1
    api_key: ${OPENAI_API_KEY}
    max_tokens: 4096
    temperature: 0.0
    top_p: 1
    stop:
    context_length: 32768
    dtype: float32
    use_parser: true

  # ── GPT family ──
  gpt-4o-mini:
    name: gpt
    engine: gpt-4o-mini
    max_retry_iters: 15
    retry_delays: 20
    stop: "\n\n"
    temperature: 0.0
    top_p: 1
    use_azure: false
    use_parser: false
    context_length: 128000

  gpt-4:
    name: gpt_azure
    engine: gpt-4
    max_retry_iters: 15
    retry_delays: 20
    stop: "\n\n"
    temperature: 0.0
